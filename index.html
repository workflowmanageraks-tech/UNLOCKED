<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Premium</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

/* Navbar */
.navbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 30px;
    background: #ffffff;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
}

/* Logo */
.logo {
    font-size: 22px;
    font-weight: bold;
}

/* Menu */
.menu {
    display: flex;
    gap: 25px;
    flex-wrap: wrap;
}

.menu a {
    text-decoration: none;
    color: #333;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="navbar">
    <div class="logo">PREMIUM</div>

    <div class="menu">
        <a onclick="checkPassword('TANGO')">TANGO</a>
        <a onclick="checkPassword('CHAMET')">CHAMET</a>
        <a onclick="checkPassword('VIRAL')">VIRAL</a>
        <a onclick="checkPassword('FACE')">FACE</a>
        <a onclick="checkPassword('STRIP')">STRIP</a>
        <a onclick="checkPassword('YOUTUBE')">YOUTUBE</a>
        <a onclick="checkPassword('MOVIE WEB SERIES')">MOVIE WEB SERIES</a>
        <a onclick="checkPassword('MISMERZING')">MISMERZING</a>
        <a onclick="checkPassword('SPRAY')">SPRAY</a>
    </div>
</div>

<script>
function checkPassword(section) {
    let pass = prompt("Enter Password:");

    if (pass === "fun") {
        alert(section + " opened successfully!");
    } else {
        alert("Wrong Password!");
    }
}
</script>

</body>
</html>
