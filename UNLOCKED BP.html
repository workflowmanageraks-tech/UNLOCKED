<!DOCTYPE html>

.navbar {

}

/* Logo */
.logo {
    font-size: 22px;
    font-weight: bold;
    display: flex;
    align-items: center;
}

.logo span {
    background: #f4c20d;
    padding: 4px 8px;
    margin-right: 5px;
}

/* Menu */
.menu {
    display: flex;
    align-items: center;
    gap: 20px;
}

.menu a {
    text-decoration: none;
    color: #333;
    font-size: 14px;
}

/* Icons */
.icons {
    display: flex;
    gap: 15px;
    font-size: 18px;
    cursor: pointer;

</head>

<body>

<div class="navbar">
    <div class="logo">

        <a href="#">Home</a>
